<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>💌 与她的点点滴滴</title>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<!-- 第三方库 -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
:root {
  --theme-primary: #ec407a;
  --theme-light: #fce4ec;
  --theme-dark: #c2185b;
  --theme-gradient: linear-gradient(135deg, #fff0f5, #fef4f8, #ffeaf2);
  --card-bg: rgba(255,255,255,0.96);
  --text-main: #333;
  --text-sub: #666;
  --text-desc: #888;
  --border: #f8c8dc;
  --shadow: 0 6px 18px rgba(216,27,96,0.08);
  --radius: 20px;
  --radius-sm: 14px;
  --radius-xs: 10px;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "微软雅黑", sans-serif;
}
html { height: 100%; scroll-behavior: smooth; }
body {
  min-height: 100vh;
  background: var(--theme-gradient);
  color: var(--text-main);
  padding: 12px;
  padding-bottom: 120px;
  transition: all 0.3s ease;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
body.keyboard-open {
  padding-bottom: calc(65vh + 40px) !important;
}

/* 模态框 */
.modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.modal-card {
  background: var(--card-bg); border-radius: var(--radius);
  width: 92%; max-width: 380px; padding: 28px; text-align: center;
  box-shadow: var(--shadow);
}
.modal-title {
  font-size: 20px; color: var(--theme-primary); font-weight: 700;
  margin-bottom: 16px;
}
.modal-desc {
  font-size: 13px; color: var(--text-desc); margin-bottom: 12px;
  line-height: 1.4;
}
.modal-input {
  width: 100%; padding: 14px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); margin: 10px 0; font-size: 15px;
  text-align: center; outline: none; background: var(--card-bg);
  color: var(--text-main);
}
.modal-btns { display: flex; gap: 10px; margin-top: 16px; }
.modal-btn {
  flex: 1; padding: 14px; border-radius: var(--radius-sm);
  border: none; font-size: 15px; font-weight: 500;
  transition: transform 0.2s ease, background 0.2s;
}
.modal-btn:active { transform: scale(0.96); }
.btn-main { background: var(--theme-primary); color: #fff; }
.btn-sub { background: var(--theme-light); color: var(--theme-primary); }
.btn-danger { background: #ef4444; color: #fff; }

/* 图片预览 */
#imgPreviewModal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.95);
  z-index: 99999; display: flex; align-items: center;
  justify-content: center; padding: 10px; touch-action: pan-x pan-y;
}
#previewImg {
  max-width: 100%; max-height: 90vh; object-fit: contain;
  border-radius: 12px; user-select: none; transform-origin: center;
}
#imgPreviewModal .close {
  position: absolute; top: 20px; right: 20px; color: #fff;
  font-size: 30px; width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.2); border-radius: 50%; cursor: pointer;
}

/* 头部 */
.header { text-align: center; padding: 20px 0 14px; }
.main-title {
  font-size: 26px; font-weight: 700;
  background: linear-gradient(90deg, var(--theme-dark), var(--theme-primary));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
#girlName {
  font-size: 18px; color: var(--theme-primary); font-weight: 600;
  margin-top: 6px;
}
#userStatus {
  font-size: 12px; color: var(--text-desc); margin-top: 4px;
}
.sub-title { font-size: 13px; color: var(--text-desc); margin-top: 4px; }

/* 统计 */
.stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin: 10px 0 18px;
}
.stat-card {
  background: var(--card-bg); border-radius: var(--radius-sm);
  padding: 14px 8px; text-align: center; box-shadow: var(--shadow);
  transition: transform 0.2s ease;
}
.stat-card:active { transform: scale(0.98); }
.stat-num {
  font-size: 20px; color: var(--theme-primary); font-weight: 700;
}
.stat-text { font-size: 12px; color: var(--text-sub); margin-top: 4px; }

/* 标签 */
.tabs {
  display: grid; grid-template-columns: repeat(5, 1fr);
  background: var(--card-bg); border-radius: var(--radius-sm);
  padding: 6px; gap: 4px; margin-bottom: 18px;
}
.tab {
  padding: 10px 4px; text-align: center; border-radius: var(--radius-xs);
  font-size: 12px; color: var(--text-sub); transition: all 0.2s ease;
}
.tab.active {
  background: var(--theme-light); color: var(--theme-primary);
  font-weight: 600;
}
.tab:active { transform: scale(0.96); }

/* 卡片 */
.card {
  background: var(--card-bg); border-radius: var(--radius);
  padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow);
  transition: transform 0.2s ease;
}
.card:active { transform: translateY(1px); }
.card-title {
  font-size: 17px; color: var(--theme-primary); font-weight: 600;
  margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
}
label {
  font-size: 14px; color: var(--text-sub); margin-bottom: 6px;
  display: block; font-weight: 500;
}
input, textarea, select {
  width: 100%; border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 13px 14px; font-size: 14px;
  margin-bottom: 12px; outline: none; background: var(--card-bg);
  color: var(--text-main); transition: all 0.2s ease;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--theme-primary);
  box-shadow: 0 0 0 4px rgba(var(--theme-primary-rgb), 0.15);
}
textarea {
  resize: none; height: 96px; line-height: 1.5;
}

/* 上传 */
.photo-upload {
  border: 2px dashed var(--border); border-radius: var(--radius-sm);
  padding: 18px; text-align: center; margin-bottom: 12px;
  transition: all 0.2s ease;
}
.photo-upload:active {
  border-color: var(--theme-primary); background: var(--theme-light);
}
.photo-preview, .record-photo {
  max-width: 100%; border-radius: 12px; margin: 10px 0;
  max-height: 320px; object-fit: contain; display: block; cursor: pointer;
}
.photo-remove {
  margin-top: 8px; padding: 8px 14px; border-radius: var(--radius-xs);
  border: none; background: #fee2e2; color: #dc2626; font-size: 12px;
}

/* 心情 */
.mood-box {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
}
.mood-item {
  padding: 8px 14px; background: var(--theme-light);
  border-radius: var(--radius-xs); font-size: 13px;
  color: var(--theme-primary); transition: all 0.2s ease;
}
.mood-item.active {
  background: var(--theme-primary); color: #fff;
}
.mood-item:active { transform: scale(0.95); }

/* 搜索筛选 */
.search-box { margin-bottom: 14px; }
.search-input {
  width: 100%; padding: 13px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); font-size: 14px;
  background: var(--card-bg); color: var(--text-main);
}
.filter-box {
  display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px;
}
.filter-item, .sort-item {
  padding: 7px 11px; background: var(--card-bg);
  border: 1px solid var(--border); border-radius: var(--radius-xs);
  font-size: 12px; color: var(--theme-primary); transition: all 0.2s ease;
}
.filter-item.active, .sort-item.active {
  background: var(--theme-primary); color: #fff;
  border-color: var(--theme-primary);
}
.filter-item:active, .sort-item:active { transform: scale(0.95); }

/* 按钮 */
.btn-group {
  display: grid; grid-template-columns: 1fr; gap: 12px; margin: 14px 0;
}
.btn {
  padding: 15px; border-radius: var(--radius-sm); border: none;
  font-size: 15px; font-weight: 500; transition: all 0.2s ease;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--theme-primary); color: #fff; }
.btn-light { background: var(--theme-light); color: var(--theme-primary); }
.btn-full { grid-column: span 1; }

/* 记录列表 */
.record-list { margin-top: 14px; padding-bottom: 40px; }
.record-item {
  background: var(--card-bg); border-radius: var(--radius-sm);
  padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow);
  border-left: 4px solid var(--theme-primary);
  transition: transform 0.2s ease; position: relative; overflow: hidden;
}
.record-item::before {
  content: "💖"; position: absolute; top: 10px; right: 10px;
  opacity: 0.15; font-size: 22px;
}
.record-item:active { transform: scale(0.99); }
.record-time {
  font-size: 12px; color: var(--text-desc); margin-bottom: 6px;
}
.record-type {
  display: inline-block; padding: 4px 9px; background: var(--theme-light);
  color: var(--theme-primary); border-radius: var(--radius-xs);
  font-size: 11px; margin-bottom: 8px; font-weight: 500;
}
.record-text {
  font-size: 14px; line-height: 1.6; color: var(--text-main);
  margin: 6px 0; word-break: break-all;
}
.record-op {
  display: flex; gap: 10px; margin-top: 12px;
}
.op-btn {
  flex: 1; padding: 8px; border-radius: var(--radius-xs);
  border: none; font-size: 12px; background: #f3f4f6;
  color: var(--text-sub); transition: all 0.2s ease;
}
.op-btn:active { transform: scale(0.95); }
.op-btn.edit {
  background: var(--theme-light); color: var(--theme-primary);
}
.op-btn.danger {
  background: #fee2e2; color: #dc2626;
}

/* 内容区 */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* 自定义项 */
.custom-item {
  display: flex; gap: 8px; margin-bottom: 10px; align-items: center;
}
.custom-item input { flex: 1; margin: 0; }
.del-custom-btn {
  width: 34px; height: 34px; border-radius: var(--radius-xs);
  border: none; background: #fee2e2; color: #dc2626;
  font-size: 12px; flex-shrink: 0;
}

/* 空状态 */
.empty {
  text-align: center; padding: 50px 0; color: var(--text-desc);
  font-size: 14px; line-height: 1.5;
}

/* 动画 */
.heart { animation: heartBeat 0.6s ease-in-out; }
@keyframes heartBeat {
  0% { transform: scale(1); }
  50% { transform: scale(1.25); }
  100% { transform: scale(1); }
}

/* 字数统计 */
.word-count {
  text-align: right; font-size: 12px; color: var(--text-desc);
  margin-top: -8px; margin-bottom: 10px;
}

/* 时光轴 */
.timeline { padding: 20px 0; }
.timeline-year {
  font-size: 16px; color: var(--theme-primary); font-weight: 600;
  margin: 20px 0 10px; padding-left: 10px;
}
.timeline-line {
  border-left: 2px solid var(--border); padding-left: 20px;
  margin-left: 10px;
}
.timeline-item {
  position: relative; margin-bottom: 20px;
}
.timeline-item::before {
  content: ""; position: absolute; left: -26px; top: 6px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--theme-primary);
}
.timeline-date {
  font-size: 12px; color: var(--text-desc); margin-bottom: 4px;
}
.timeline-content {
  background: var(--card-bg); border-radius: var(--radius-xs);
  padding: 12px; box-shadow: var(--shadow);
}

/* 日历 */
.calendar {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px; margin: 10px 0;
}
.calendar-day {
  aspect-ratio: 1; display: flex; align-items: center;
  justify-content: center; border-radius: var(--radius-xs);
  font-size: 12px; background: var(--card-bg); color: var(--text-sub);
}
.calendar-day.active { background: var(--theme-primary); color: #fff; }

/* 饼图 */
.chart-box { height: 200px; margin: 10px 0; }
</style>
</head>

<!-- 图片预览 -->
<div id="imgPreviewModal" style="display:none;" onclick="closeImgPreview()">

</div>

<!-- 登录 -->
<div class="modal" id="loginModal">
  <div class="modal-card">
    <div class="modal-title">💌 与她的点点滴滴</div>
    <input type="email" class="modal-input" id="loginEmail" placeholder="邮箱">

</div>

<!-- 主内容 -->

const auth = firebase.auth();
const db = firebase.database();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// ==============================================
// 全局变量
// ==============================================
let currentUser = null;
let currentMood = "";
let currentTab = 0;
let currentFilter = "all";
let currentSort = "desc";
let editRecordId = null;
let currentPhotoBase64 = "";
let resizeTimer, scrollTimer;

// ==============================================
// 2. 主题
// ==============================================
function setTheme(theme) {
  document.body.setAttribute('data-theme', theme);
  localStorage.setItem('THEME', theme);
  showTip('✅ 主题已切换');
}
const savedTheme = localStorage.getItem('THEME') || 'pink';
document.body.setAttribute('data-theme', savedTheme);

// ==============================================
// 3. 图片预览（缩放+双击）
// ==============================================
function openImgPreview(src) {
  const img = document.getElementById('previewImg');
  img.src = src;
  img.style.transform = 'scale(1)';
  document.getElementById('imgPreviewModal').style.display = 'flex';
  let scale = 1, lastScale = 1, startX;
  img.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      startX = Math.hypot(dx, dy);
    }
  });
  img.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      scale = lastScale * (dist / startX);
      scale = Math.max(1, Math.min(3, scale));
      img.style.transform = `scale(${scale})`;
    }
  });
  img.addEventListener('touchend', () => lastScale = scale);
  img.addEventListener('dblclick', () => {
    scale = scale === 1 ? 2 : 1;
    lastScale = scale;
    img.style.transform = `scale(${scale})`;
  });
}
function closeImgPreview() {
  document.getElementById('imgPreviewModal').style.display = 'none';
}

// ==============================================
// 4. 登录状态监听
// ==============================================
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById("loginModal").style.display = "none";
    document.querySelectorAll(".main-app-content").forEach(e => e.style.display = "block");
    document.getElementById("userStatus").innerText = `🟢 ${user.email}`;
    syncData(); // 登录后自动同步云端
    initAll();
  } else {
    currentUser = null;
    document.getElementById("loginModal").style.display = "flex";
    document.querySelectorAll(".main-app-content").forEach(e => e.style.display = "none");
  }
});

// ==============================================
// 5. 登录 / 注册 / 退出
// ==============================================
function login() {
  const e = document.getElementById("loginEmail").value.trim();
  const p = document.getElementById("loginPwd").value.trim();
  if (!e || p.length < 6) return showTip("密码≥6位");
  auth.signInWithEmailAndPassword(e, p)
    .then(() => showTip("✅ 登录成功"))
    .catch(err => showTip("❌ " + err.message));
}
function register() {
  const e = document.getElementById("loginEmail").value.trim();
  const p = document.getElementById("loginPwd").value.trim();
  if (!e || p.length < 6) return showTip("密码≥6位");
  auth.createUserWithEmailAndPassword(e, p)
    .then(() => showTip("✅ 注册成功"))
    .catch(err => showTip("❌ " + err.message));
}
function logout() {
  if (!confirm("确定退出？")) return;
  auth.signOut();
}

// ==============================================
// 6. 云端同步（核心）
// ==============================================
function syncData() {
  if (!currentUser) return showTip("请先登录");
  // 从云端拉取
  db.ref('users/' + currentUser.uid).once('value').then(s => {
    const d = s.val();
    if (d) {
      if (d.records) localStorage.setItem("RECORDS", JSON.stringify(Object.values(d.records)));
      if (d.profile) localStorage.setItem("PROFILE", JSON.stringify(d.profile));
      showTip("✅ 同步成功");
      initAll();
    } else {
      // 云端无数据：上传本地
      uploadLocalToCloud();
    }
  });
}
// 本地 → 云端
function uploadLocalToCloud() {
  if (!currentUser) return;
  const records = JSON.parse(localStorage.getItem("RECORDS") || "[]");
  const profile = JSON.parse(localStorage.getItem("PROFILE") || "{}");
  const updates = {};
  updates['users/' + currentUser.uid + '/profile'] = profile;
  records.forEach(r => {
    updates['users/' + currentUser.uid + '/records/' + r.id] = r;
  });
  db.ref().update(updates);
}

// ==============================================
// 7. 保存记录（自动同步云端）
// ==============================================
function saveRecord() {
  const t = document.getElementById("recordType").value;
  const m = document.getElementById("moodText").value.trim() || currentMood || "未填写";
  const c = document.getElementById("recordContent").value.trim();
  const q = document.getElementById("recordQuote").value.trim() || "无";
  if (!c && !currentPhotoBase64) return showTip("写点内容或传图");

  const time = editRecordId
    ? (JSON.parse(localStorage.getItem("RECORDS") || "[]").find(x => x.id == editRecordId)?.time || getTime())
    : getTime();

  const rec = {
    id: editRecordId || Date.now(),
    time, type: t, mood: m, content: c, quote: q, photo: currentPhotoBase64
  };

  // 本地保存
  let rs = JSON.parse(localStorage.getItem("RECORDS") || "[]");
  if (editRecordId) {
    const i = rs.findIndex(x => x.id == editRecordId);
    if (i !== -1) rs[i] = rec;
    showTip("✅ 修改成功");
  } else {
    rs.unshift(rec);
    showTip("✅ 保存成功");
    if (navigator.vibrate) navigator.vibrate(30);
  }
  localStorage.setItem("RECORDS", JSON.stringify(rs));

  // 云端保存
  if (currentUser) {
    db.ref('users/' + currentUser.uid + '/records/' + rec.id).set(rec);
  }

  document.querySelector(".main-title").classList.add("heart");
  setTimeout(() => document.querySelector(".main-title").classList.remove("heart"), 600);

  clearDraft();
  initAll();
}

// ==============================================
// 8. 删除记录（本地+云端）
// ==============================================
function deleteRecord(id) {
  if (!confirm("确定删除？")) return;
  // 本地
  let rs = JSON.parse(localStorage.getItem("RECORDS") || "[]");
  rs = rs.filter(x => x.id != id);
  localStorage.setItem("RECORDS", JSON.stringify(rs));
  // 云端
  if (currentUser) {
    db.ref('users/' + currentUser.uid + '/records/' + id).remove();
  }
  showTip("🗑️ 已删除");
  initAll();
}

// ==============================================
// 9. 保存档案（本地+云端）
// ==============================================
function saveProfile() {
  const p = {
    name: document.getElementById("nickname").value.trim(),
    birth: document.getElementById("birthday").value,
    first: document.getElementById("firstDay").value,
    like: document.getElementById("like").value.trim(),
    hate: document.getElementById("hate").value.trim(),
    habit: document.getElementById("habit").value.trim(),
    custom: []
  };
  document.querySelectorAll(".custom-item").forEach(i => {
    p.custom.push({
      k: i.querySelector(".cKey").value,
      v: i.querySelector(".cVal").value
    });
  });
  localStorage.setItem("PROFILE", JSON.stringify(p));
  if (currentUser) {
    db.ref('users/' + currentUser.uid + '/profile').set(p);
  }
  document.getElementById("girlName").innerText = p.name || "我的女孩";
  updateStats();
  showTip("✅ 档案已保存");
}

// ==============================================
// 10. 工具函数（时间、字数、上传、初始化等）
// ==============================================
function getTime() {
  const now = new Date();
  const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');
  const h = String(now.getHours()).padStart(2,'0'), i = String(now.getMinutes()).padStart(2,'0');
  return `${y}-${m}-${d}T${h}:${i}`;
}
function updateWordCount() {
  const a = document.getElementById("recordContent").value.length;
  const b = document.getElementById("recordQuote").value.length;
  document.getElementById("wordCount1").innerText = a + " 字";
  document.getElementById("wordCount2").innerText = b + " 字";
}
function handlePhotoUpload(e) {
  const f = e.target.files[0];
  if (!f) return;
  if (f.size > 6 * 1024 * 1024) return showTip("图片≤6MB");
  const r = new FileReader();
  r.onload = e => {
    currentPhotoBase64 = e.target.result;
    document.getElementById("photoPreviewWrap").innerHTML = `
      <img src="${currentPhotoBase64}" class="photo-preview">
      <button class="photo-remove" onclick="removePhoto()">删除</button>
    `;
  };
  r.readAsDataURL(f);
}
function removePhoto() {
  currentPhotoBase64 = "";
  document.getElementById("photoPreviewWrap").innerHTML = "";
}
function initAll() {
  loadProfile();
  showRecords();
  renderTimeline();
  renderCalendar();
  renderMoodChart();
  updateStats();
  loadDraft();
  updateWordCount();
}
function switchTab(i) {
  currentTab = i;
  document.querySelectorAll(".tab").forEach((t, j) => t.classList.toggle("active", j === i));
  document.querySelectorAll(".tab-content").forEach((c, j) => c.classList.toggle("active", j === i));
  if (i === 1) showRecords();
  if (i === 2) { renderTimeline(); renderCalendar(); renderMoodChart(); }
  if (i === 3) loadProfile();
  window.scrollTo(0, 0);
}
function selectMood(el, t) {
  document.querySelectorAll(".mood-item").forEach(i => i.classList.remove("active"));
  el.classList.add("active");
  currentMood = t;
  document.getElementById("moodText").value = t;
  saveDraft();
}
function filterRecord(el, t) {
  currentFilter = t;
  document.querySelectorAll(".filter-item").forEach(i => i.classList.remove("active"));
  el.classList.add("active");
  showRecords();
}
function sortRecord(el, t) {
  currentSort = t;
  document.querySelectorAll(".sort-item").forEach(i => i.classList.remove("active"));
  el.classList.add("active");
  showRecords();
}
function searchRecord() {
  showRecords();
}
function saveDraft() {
  localStorage.setItem("DRAFT", JSON.stringify({
    type: document.getElementById("recordType").value,
    mood: document.getElementById("moodText").value,
    content: document.getElementById("recordContent").value,
    quote: document.getElementById("recordQuote").value,
    photo: currentPhotoBase64
  }));
}
function loadDraft() {
  const d = JSON.parse(localStorage.getItem("DRAFT") || "{}");
  if (d.type) document.getElementById("recordType").value = d.type;
  if (d.mood) document.getElementById("moodText").value = d.mood;
  if (d.content) document.getElementById("recordContent").value = d.content;
  if (d.quote) document.getElementById("recordQuote").value = d.quote;
  if (d.photo) {
    currentPhotoBase64 = d.photo;
    document.getElementById("photoPreviewWrap").innerHTML = `
      <img src="${currentPhotoBase64}" class="photo-preview">
      <button class="photo-remove" onclick="removePhoto()">删除</button>
    `;
  }
  updateWordCount();
}
function clearDraft() {
  localStorage.removeItem("DRAFT");
  document.getElementById("moodText").value = "";
  document.getElementById("recordContent").value = "";
  document.getElementById("recordQuote").value = "";
  document.querySelectorAll(".mood-item").forEach(i => i.classList.remove("active"));
  currentMood = "";
  editRecordId = null;
  currentPhotoBase64 = "";
  document.getElementById("photoPreviewWrap").innerHTML = "";
  document.getElementById("recordType").selectedIndex = 0;
  updateWordCount();
}
function addCustom() {
  const wrap = document.getElementById("customWrap");
  const div = document.createElement("div");
  div.className = "custom-item";
  div.innerHTML = `
    <input placeholder="名称" class="cKey">
    <input placeholder="内容" class="cVal">
    <button class="del-custom-btn" onclick="this.parentElement.remove()">×</button>
  `;
  wrap.appendChild(div);
}
function loadProfile() {
  const p = JSON.parse(localStorage.getItem("PROFILE") || "{}");
  document.getElementById("nickname").value = p.name || "";
  document.getElementById("birthday").value = p.birth || "";
  document.getElementById("firstDay").value = p.first || "";
  document.getElementById("like").value = p.like || "";
  document.getElementById("hate").value = p.hate || "";
  document.getElementById("habit").value = p.habit || "";
  document.getElementById("girlName").innerText = p.name || "我的女孩";
  const wrap = document.getElementById("customWrap");
  wrap.innerHTML = "";
  (p.custom || []).forEach(i => {
    const div = document.createElement("div");
    div.className = "custom-item";
    div.innerHTML = `
      <input value="${i.k}" class="cKey">
      <input value="${i.v}" class="cVal">
      <button class="del-custom-btn" onclick="this.parentElement.remove()">×</button>
    `;
    wrap.appendChild(div);
  });
}
function editRecord(id) {
  const rs = JSON.parse(localStorage.getItem("RECORDS") || "[]");
  const r = rs.find(x => x.id == id);
  if (!r) return;
  document.getElementById("recordType").value = r.type;
  document.getElementById("moodText").value = r.mood;
  document.getElementById("recordContent").value = r.content;
  document.getElementById("recordQuote").value = r.quote;
  if (r.photo) {
    currentPhotoBase64 = r.photo;
    document.getElementById("photoPreviewWrap").innerHTML = `
      <img src="${currentPhotoBase64}" class="photo-preview">
      <button class="photo-remove" onclick="removePhoto()">删除</button>
    `;
  } else {
    currentPhotoBase64 = "";
    document.getElementById("photoPreviewWrap").innerHTML = "";
  }
  editRecordId = id;
  switchTab(0);
}
function copyRecord(c, q) {
  const txt = `💌 故事：${c}\n💬 语录：${q}`;
  navigator.clipboard.writeText(txt).then(() => showTip("✅ 复制成功")).catch(() => alert(txt));
}
function showRecords() {
  const rs = JSON.parse(localStorage.getItem("RECORDS") || "[]");
  const box = document.getElementById("recordBox");
  const key = (document.getElementById("searchInput")?.value.trim().toLowerCase() || "");

  if (rs.length === 0) {
    box.innerHTML = '<div class="empty">还没有记录哦💕</div>';
    return;
  }

  let f = currentFilter === "all" ? rs : rs.filter(x => x.type === currentFilter);
  if (key) {
    f = f.filter(x =>
      (x.content || "").toLowerCase().includes(key) ||
      (x.quote || "").toLowerCase().includes(key) ||
      (x.mood || "").toLowerCase().includes(key)
    );
  }
  if (currentSort === "asc") f = [...f].reverse();

  if (f.length === 0) {
    box.innerHTML = '<div class="empty">没有找到匹配的回忆</div>';
    return;
  }

  let h = "";
  f.forEach(x => {
    h += `
      <div class="record-item">
        <div class="record-time">📅 ${x.time.replace("T", " ")}</div>
        <div class="record-type">${x.type}</div>
        <div class="record-text">😊 ${x.mood}</div>
        <div class="record-text">💌 ${x.content || "无"}</div>
        <div class="record-text">💬 ${x.quote || "无"}</div>
        ${x.photo ? `<img src="${x.photo}" class="record-photo" onclick="openImgPreview('${x.photo}')">` : ""}
        <div class="record-op">
          <button class="op-btn edit" onclick="editRecord(${x.id})">编辑</button>
          <button class="op-btn" onclick="copyRecord('${x.content?.replace(/'/g, "\\'") || ""}', '${x.quote?.replace(/'/g, "\\'") || ""}')">复制</button>
          <button class="op-btn danger" onclick="deleteRecord(${x.id})">删除</button>
        </div>
      </div>
    `;
  });
  box.innerHTML = h;
}
function updateStats() {
  const rs = JSON.parse(localStorage.getItem("RECORDS") || "[]");
  document.getElementById("totalNum").innerText = rs.length;

  const p = JSON.parse(localStorage.getItem("PROFILE") || "{}");
  if (p.first) {
    const fd = new Date(p.first);
    const td = new Date();
    const d1 = new Date(fd.getFullYear(), fd.getMonth(), fd.getDate());
    const d2 = new Date(td.getFullYear(), td.getMonth(), td.getDate());
    const days = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));
    document.getElementById("loveDay").innerText = days >= 0 ? days : 0;
  } else {
    document.getElementById("loveDay").innerText = 0;
  }
  if (p.birth) {
    const bd = new Date(p.birth);
    const now = new Date();
    bd.setFullYear(now.getFullYear());
    if (bd < now) bd.setFullYear(now.getFullYear() + 1);
    const days = Math.ceil((bd - now) / (1000 * 60 * 60 * 24));
    document.getElementById("nextDay").innerText = days;
  } else {
    document.getElementById("nextDay").innerText = 0;
  }
}
function renderTimeline() {
  const rs = JSON.parse(localStorage.getItem("RECORDS") || "[]");
  const box = document.getElementById("timelineBox");
  if (rs.length === 0) {
    box.innerHTML = '<div class="empty">暂无回忆</div>';
    return;
  }
  const sorted = [...rs].sort((a, b) => new Date(a.time) - new Date(b.time));
  const yearMap = {};
  sorted.forEach(r => {
    const year = r.time.split("-")[0];
    if (!yearMap[year]) yearMap[year] = [];
    yearMap[year].push(r);
  });
  let h = "";
  Object.keys(yearMap).sort().forEach(year => {
    h += `<div class="timeline-year">${year}年</div><div class="timeline-line">`;
    yearMap[year].forEach(r => {
      h += `
        <div class="timeline-item">
          <div class="timeline-date">${r.time.replace("T", " ")}</div>
          <div class="timeline-content">
            <div style="color:var(--theme-primary);font-weight:500;">${r.type}</div>
            <div style="margin:4px 0;">${r.content || "无"}</div>
            ${r.photo ? `<img src="${r.photo}" style="max-width:100%;border-radius:8px;margin-top:6px;">` : ""}
          </div>
        </div>
      `;
    });
    h += "</div>";
  });
  box.innerHTML = h;
}
function renderCalendar() {
  const box = document.getElementById("calendarBox");
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  let h = "";
  for (let i = 0; i < firstDay; i++) h += `<div class="calendar-day"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    h += `<div class="calendar-day">${d}</div>`;
  }
  box.innerHTML = h;
}
function renderMoodChart() {
  const rs = JSON.parse(localStorage.getItem("RECORDS") || "[]");
  const moodCount = {};
  rs.forEach(r => {
    const m = r.mood || "未填写";
    moodCount[m] = (moodCount[m] || 0) + 1;
  });
  const ctx = document.getElementById("moodChart").getContext("2d");
  if (window.moodChartInstance) window.moodChartInstance.destroy();
  window.moodChartInstance = new Chart(ctx, {
    type: "pie",
    data: {
      labels: Object.keys(moodCount),
      datasets: [{
        data: Object.values(moodCount),
        backgroundColor: ["#ec407a","#42a5f5","#66bb6a","#ffa726","#7e57c2","#26a69a","#ef5350"]
      }]
    },
    options: { responsive: true, maintainAspectRatio: false }
  });
}
function exportPdf() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const content = document.getElementById("recordBox");
  html2canvas(content).then(canvas => {
    const img = canvas.toDataURL("image/png");
    const imgWidth = 210;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    doc.addImage(img, "PNG", 0, 0, imgWidth, imgHeight);
    doc.save("与她的回忆.pdf");
  });
}
function exportImage() {
  const content = document.getElementById("recordBox");
  html2canvas(content, { useCORS: true }).then(canvas => {
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "与她的回忆.png";
    a.click();
  });
}
function backupData() {
  const data = {
    records: localStorage.getItem("RECORDS"),
    profile: localStorage.getItem("PROFILE"),
    draft: localStorage.getItem("DRAFT")
  };
  navigator.clipboard.writeText(JSON.stringify(data)).then(() => showTip("✅ 备份已复制"));
}
function restoreData() {
  const data = prompt("粘贴备份内容：");
  if (!data) return;
  try {
    const d = JSON.parse(data);
    if (d.records) localStorage.setItem("RECORDS", d.records);
    if (d.profile) localStorage.setItem("PROFILE", d.profile);
    if (d.draft) localStorage.setItem("DRAFT", d.draft);
    showTip("✅ 恢复成功");
    initAll();
  } catch (e) {
    showTip("❌ 格式错误");
  }
}
function clearAllData() {
  if (!confirm("确定清空所有数据？不可恢复！")) return;
  localStorage.clear();
  if (currentUser) {
    db.ref('users/' + currentUser.uid).remove();
  }
  showTip("🗑️ 已清空");
  location.reload();
}
function changePwd() {
  const old = prompt("当前密码：");
  if (!old) return;
  const cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, old);
  currentUser.reauthenticateWithCredential(cred).then(() => {
    const np = prompt("新密码（≥6位）：");
    if (np && np.length >= 6) {
      currentUser.updatePassword(np).then(() => showTip("✅ 修改成功"));
    }
  }).catch(() => showTip("原密码错误"));
}
function setLockPwd() {
  const p = prompt("设置锁屏密码（4位以上）：");
  if (p && p.length >= 4) {
    localStorage.setItem("LOCK_PWD", p);
    showTip("✅ 已设置");
  }
}
function setFakePwd() {
  const p = prompt("设置伪装密码：");
  if (p && p.length >= 4) {
    localStorage.setItem("FAKE_PWD", p);
    showTip("✅ 已设置");
  }
}
function showTip(t) {
  const m = document.createElement("div");
  m.className = "modal";
  m.innerHTML = `<div class="modal-card"><div class="modal-title">${t}</div></div>`;
  document.body.appendChild(m);
  setTimeout(() => m.remove(), 1400);
}

// 键盘适配
const oh = window.innerHeight;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const ch = window.innerHeight;
    if (ch < oh - 120) {
      document.body.classList.add("keyboard-open");
    } else {
      document.body.classList.remove("keyboard-open");
    }
  }, 150);
});
</script>
