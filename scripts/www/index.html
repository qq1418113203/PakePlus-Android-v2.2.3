<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>时光情书 · 与你的温柔日记</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
:root {
  --primary: #d65a8f;
  --primary-light: #f8e6ee;
  --primary-deep: #c04a7d;
  --bg: linear-gradient(135deg, #fdf6fa, #fcf0f7, #fbeaf5);
  --card: rgba(255, 255, 255, 0.97);
  --text: #2a2a2a;
  --text-sub: #666;
  --text-desc: #999;
  --border: #f3d5e3;
  --radius: 24px;
  --radius-sm: 16px;
  --radius-xs: 12px;
  --shadow: 0 8px 25px rgba(180, 60, 110, 0.07);
  --shadow-hover: 0 12px 32px rgba(180, 60, 110, 0.12);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', '微软雅黑', sans-serif;
}

html {
  height: 100%;
  scroll-behavior: smooth;
}

body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  padding: 16px 14px 140px;
  transition: all 0.3s;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

/* 登录遮罩 */
#authModal {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.auth-box {
  width: 100%;
  max-width: 380px;
  background: var(--card);
  border-radius: var(--radius);
  padding: 30px;
  box-shadow: var(--shadow);
}
.auth-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
  text-align: center;
  margin-bottom: 6px;
}
.auth-sub {
  text-align: center;
  color: var(--text-desc);
  font-size: 14px;
  margin-bottom: 24px;
}
.auth-input {
  width: 100%;
  padding: 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  margin-bottom: 14px;
  font-size: 15px;
  outline: none;
}
.auth-input:focus {
  border-color: var(--primary);
}
.auth-btn {
  width: 100%;
  padding: 16px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--primary);
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 12px;
}

/* 标题区域 */
.header {
  text-align: center;
  padding: 30px 0 20px;
}
.main-title {
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(90deg, #b8326d, #d65a8f, #e684ac);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: 1px;
}
.sub-title {
  font-size: 14px;
  color: var(--text-desc);
  margin-top: 6px;
  font-weight: 400;
}
#girlName {
  font-size: 20px;
  font-weight: 600;
  color: var(--primary);
  margin-top: 8px;
}

/* 统计卡片 */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 10px 0 24px;
}
.stat-card {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 18px 10px;
  text-align: center;
  box-shadow: var(--shadow);
  transition: all 0.25s ease;
}
.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}
.stat-num {
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
}
.stat-text {
  font-size: 12px;
  color: var(--text-sub);
  margin-top: 4px;
}

/* 标签栏 */
.tabs {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 10px 6px;
  gap: 6px;
  margin-bottom: 22px;
  box-shadow: var(--shadow);
}
.tab {
  padding: 10px 4px;
  text-align: center;
  border-radius: var(--radius-xs);
  font-size: 12px;
  color: var(--text-sub);
  transition: all 0.25s ease;
  font-weight: 500;
  line-height: 1.3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.tab.active {
  background: var(--primary-light);
  color: var(--primary-deep);
  font-weight: 600;
}
.tab:active {
  transform: scale(0.96);
}

/* 卡片 */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  transition: all 0.25s ease;
}
.card:hover {
  box-shadow: var(--shadow-hover);
}
.card-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--primary-deep);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 6px;
}
label {
  font-size: 14px;
  color: var(--text-sub);
  margin-bottom: 8px;
  display: block;
  font-weight: 500;
}
input, textarea, select {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 15px 16px;
  font-size: 15px;
  margin-bottom: 14px;
  outline: none;
  background: var(--card);
  color: var(--text);
  transition: all 0.2s;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(214, 90, 143, 0.1);
}
textarea {
  resize: none;
  height: 110px;
  line-height: 1.6;
}

/* 上传 */
.photo-upload {
  border: 2px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 24px;
  text-align: center;
  margin-bottom: 14px;
  transition: all 0.25s ease;
}
.photo-upload:active {
  border-color: var(--primary);
  background: var(--primary-light);
}
.photo-preview, .record-photo {
  max-width: 100%;
  border-radius: 14px;
  margin: 10px 0;
  max-height: 360px;
  object-fit: contain;
  display: block;
  cursor: pointer;
}
.photo-remove {
  margin-top: 8px;
  padding: 8px 16px;
  border-radius: var(--radius-xs);
  border: none;
  background: #fee2e2;
  color: #d32f2f;
  font-size: 13px;
}

/* 心情 */
.mood-box {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 16px;
}
.mood-item {
  padding: 10px 16px;
  background: var(--primary-light);
  border-radius: var(--radius-xs);
  font-size: 13px;
  color: var(--primary-deep);
  transition: all 0.25s ease;
}
.mood-item.active {
  background: var(--primary);
  color: #fff;
}
.mood-item:active {
  transform: scale(0.95);
}

/* 搜索筛选 */
.search-box {
  margin-bottom: 16px;
}
.search-input {
  width: 100%;
  padding: 15px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-size: 15px;
  background: var(--card);
}
.filter-box {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.filter-item, .sort-item {
  padding: 9px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  font-size: 13px;
  color: var(--primary-deep);
  transition: all 0.25s ease;
}
.filter-item.active, .sort-item.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

/* 按钮 */
.btn-group {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  margin: 16px 0;
}
.btn {
  padding: 17px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 16px;
  font-weight: 500;
  transition: all 0.25s ease;
  /* 给所有按钮统一加上下边距，避免挤在一起 */
  margin-bottom: 12px;
}
/* 最后一个按钮去掉下边距 */
.btn:last-child {
  margin-bottom: 0;
}
.btn:hover {
  transform: translateY(-2px);
}
.btn:active {
  transform: scale(0.97);
}
.btn-primary {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 6px 16px rgba(214, 90, 143, 0.25);
}
.btn-light {
  background: var(--primary-light);
  color: var(--primary-deep);
}
.btn-danger {
  background: #e53935;
  color: #fff;
}

/* 记录列表 */
.record-list {
  margin-top: 16px;
  padding-bottom: 40px;
}
.record-item {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 22px;
  margin-bottom: 16px;
  border-left: 5px solid var(--primary);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
  transition: all 0.25s ease;
}
.record-item:hover {
  box-shadow: var(--shadow-hover);
}
.record-item::before {
  content: "💖";
  position: absolute;
  top: 12px;
  right: 14px;
  opacity: 0.12;
  font-size: 26px;
}
.record-time {
  font-size: 12px;
  color: var(--text-desc);
  margin-bottom: 8px;
}
.record-type {
  display: inline-block;
  padding: 5px 11px;
  background: var(--primary-light);
  color: var(--primary-deep);
  border-radius: var(--radius-xs);
  font-size: 12px;
  margin-bottom: 10px;
  font-weight: 500;
}
.record-text {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
  margin: 6px 0;
  word-break: break-all;
}
.record-op {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}
.op-btn {
  flex: 1;
  padding: 10px;
  border-radius: var(--radius-xs);
  border: none;
  font-size: 13px;
  background: #f5f5f5;
  color: var(--text-sub);
  transition: all 0.2s;
}
.op-btn.edit {
  background: var(--primary-light);
  color: var(--primary-deep);
}
.op-btn.danger {
  background: #ffebee;
  color: #c62828;
}

/* 内容区 */
.tab-content {
  display: none;
}
.tab-content.active {
  display: block;
}

/* 自定义项 */
.custom-item {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  align-items: center;
}
.custom-item input {
  flex: 1;
  margin: 0;
}
.del-custom-btn {
  width: 38px;
  height: 38px;
  border-radius: var(--radius-xs);
  border: none;
  background: #ffebee;
  color: #c62828;
  font-size: 14px;
}

/* 空状态 */
.empty {
  text-align: center;
  padding: 60px 0;
  color: var(--text-desc);
  font-size: 15px;
}

/* 动画 */
.heart {
  animation: heartBeat 0.6s ease-in-out;
}
@keyframes heartBeat {
  0% { transform: scale(1); }
  50% { transform: scale(1.25); }
  100% { transform: scale(1); }
}

/* 字数统计 */
.word-count {
  text-align: right;
  font-size: 12px;
  color: var(--text-desc);
  margin-top: -8px;
  margin-bottom: 12px;
}

/* 时光轴 */
.timeline {
  padding: 20px 0;
}
.timeline-year {
  font-size: 17px;
  color: var(--primary-deep);
  font-weight: 600;
  margin: 24px 0 12px;
  padding-left: 10px;
}
.timeline-line {
  border-left: 2px solid var(--border);
  padding-left: 24px;
  margin-left: 10px;
}
.timeline-item {
  position: relative;
  margin-bottom: 24px;
}
.timeline-item::before {
  content: "";
  position: absolute;
  left: -30px;
  top: 8px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--primary);
}
.timeline-date {
  font-size: 12px;
  color: var(--text-desc);
  margin-bottom: 6px;
}
.timeline-content {
  background: var(--card);
  border-radius: var(--radius-xs);
  padding: 16px;
  box-shadow: var(--shadow);
}

/* 日历 */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin: 12px 0;
}
.calendar-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-xs);
  font-size: 13px;
  background: var(--card);
  color: var(--text-sub);
}
.calendar-day.active {
  background: var(--primary);
  color: #fff;
}

/* 图表 */
.chart-box {
  height: 220px;
  margin: 12px 0;
}

/* 图片预览 */
#imgPreviewModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.96);
  z-index: 99999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#previewImg {
  max-width: 100%;
  max-height: 90vh;
  border-radius: 16px;
  object-fit: contain;
}
#imgPreviewModal .close {
  position: absolute;
  top: 24px;
  right: 24px;
  color: #fff;
  font-size: 32px;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 登录界面 -->
<div id="authModal">
  <div class="auth-box">
    <div class="auth-title">时光情书</div>
    <div class="auth-sub">登录后即可云同步回忆</div>
    <input id="email" class="auth-input" placeholder="邮箱" type="email">
    <input id="pwd" class="auth-input" placeholder="密码" type="password">
    <button class="auth-btn" onclick="login()">登录</button>
    <button class="auth-btn" style="background:var(--primary-light);color:var(--primary-deep)" onclick="register()">注册</button>
  </div>
</div>

<!-- 图片预览 -->
<div id="imgPreviewModal">
  <div class="close" onclick="closeImgPreview()">×</div>
  <img id="previewImg" src="">
</div>

<!-- 头部 -->
<div class="header">
  <div class="main-title">时光情书</div>
  <div id="girlName">我的女孩</div>
  <div class="sub-title">记录每一个心动与温柔</div>
</div>

<!-- 统计 -->
<div class="stats">
  <div class="stat-card">
    <div class="stat-num" id="totalNum">0</div>
    <div class="stat-text">回忆总数</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="loveDay">0</div>
    <div class="stat-text">陪伴天数</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="nextDay">0</div>
    <div class="stat-text">生日倒计时</div>
  </div>
</div>

<!-- 菜单栏 -->
<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">✍️<span>写日记</span></div>
  <div class="tab" onclick="switchTab(1)">🔍<span>查回忆</span></div>
  <div class="tab" onclick="switchTab(2)">📜<span>时光轴</span></div>
  <div class="tab" onclick="switchTab(3)">🎯<span>她的档案</span></div>
  <div class="tab" onclick="switchTab(4)">⚙️<span>设置</span></div>
</div>

<!-- 写日记 -->
<div class="tab-content active" id="tab0">
  <div class="card">
    <div class="card-title">✍️ 记录心动瞬间</div>
    <label>📂 分类</label>
    <select id="recordType">
      <option>日常小事</option>
      <option>心动时刻</option>
      <option>约会回忆</option>
      <option>初见纪念</option>
    </select>

    <label>😊 心情</label>
    <div class="mood-box">
      <div class="mood-item" onclick="selectMood(this,'开心')">开心</div>
      <div class="mood-item" onclick="selectMood(this,'心动')">心动</div>
      <div class="mood-item" onclick="selectMood(this,'想念')">想念</div>
      <div class="mood-item" onclick="selectMood(this,'温暖')">温暖</div>
      <div class="mood-item" onclick="selectMood(this,'害羞')">害羞</div>
      <div class="mood-item" onclick="selectMood(this,'期待')">期待</div>
    </div>
    <input type="text" id="moodText" placeholder="自定义心情">

    <label>💌 故事</label>
    <textarea id="recordContent" placeholder="记录你们的故事..." oninput="updateWordCount()"></textarea>
    <div class="word-count" id="wordCount1">0 字</div>

    <label>💬 语录</label>
    <textarea id="recordQuote" placeholder="她的暖心话..." oninput="updateWordCount()"></textarea>
    <div class="word-count" id="wordCount2">0 字</div>

    <label>📸 照片</label>
    <div class="photo-upload" onclick="document.getElementById('photoInput').click()">
      <div style="color:var(--primary); font-size:15px;">点击上传照片</div>
      <input type="file" id="photoInput" accept="image/*" style="display:none;" onchange="handlePhotoUpload(event)">
    </div>
    <div id="photoPreviewWrap"></div>
  </div>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="saveRecord()">💾 保存日记</button>
  </div>
</div>

<!-- 查回忆 -->
<div class="tab-content" id="tab1">
  <div class="card">
    <div class="card-title">🔍 回忆管理</div>
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索关键词" oninput="searchRecord()">
    </div>
    <div class="filter-box">
      <div class="filter-item active" onclick="filterRecord(this,'all')">全部</div>
      <div class="filter-item" onclick="filterRecord(this,'日常小事')">日常</div>
      <div class="filter-item" onclick="filterRecord(this,'心动时刻')">心动</div>
      <div class="filter-item" onclick="filterRecord(this,'约会回忆')">约会</div>
      <div class="filter-item" onclick="filterRecord(this,'初见纪念')">初见</div>
    </div>
    <div class="filter-box">
      <div class="sort-item active" onclick="sortRecord(this,'desc')">最新</div>
      <div class="sort-item" onclick="sortRecord(this,'asc')">最早</div>
      <div class="sort-item" onclick="exportPdf()">导出PDF</div>
      <div class="sort-item" onclick="exportImage()">导出长图</div>
    </div>
  </div>
  <div class="record-list" id="recordBox"></div>
</div>

<!-- 时光轴 -->
<div class="tab-content" id="tab2">
  <div class="card">
    <div class="card-title">📜 时光轴</div>
    <div class="timeline" id="timelineBox"></div>
  </div>
  <div class="card">
    <div class="card-title">📅 回忆日历</div>
    <div class="calendar" id="calendarBox"></div>
  </div>
  <div class="card">
    <div class="card-title">😊 心情统计</div>
    <div class="chart-box"><canvas id="moodChart"></canvas></div>
  </div>
</div>

<!-- 她的档案 -->
<div class="tab-content" id="tab3">
  <div class="card">
    <div class="card-title">🎯 她的专属档案</div>
    <label>👧 昵称</label>
    <input type="text" id="nickname" placeholder="宝贝/小乖/老婆">
    <label>🎂 生日</label>
    <input type="date" id="birthday">
    <label>👋 相识纪念日</label>
    <input type="date" id="firstDay">
    <label>🍬 喜欢</label>
    <input type="text" id="like" placeholder="食物/爱好/礼物">
    <label>🚫 忌口/不喜欢</label>
    <input type="text" id="hate" placeholder="不吃/讨厌/避雷">
    <label>✨ 小习惯</label>
    <input type="text" id="habit" placeholder="口头禅/小动作/偏好">
    <div class="card-title" style="margin-top:24px">📌 自定义信息</div>
    <div id="customWrap"></div>
    <button class="btn btn-light" onclick="addCustom()">➕ 添加项目</button>
    <button class="btn btn-primary" onclick="saveProfile()">✅ 保存档案</button>
  </div>
</div>

<!-- 设置 -->
<div class="tab-content" id="tab4">
  <div class="card">
    <div class="card-title">🔒 安全设置</div>
    <button class="btn btn-light" onclick="setLockPwd()">设置锁屏密码</button>
    <button class="btn btn-light" onclick="setFakePwd()">设置伪装密码</button>
    <button class="btn btn-light" onclick="logout()">退出登录</button>
  </div>
  <div class="card">
    <div class="card-title">☁️ 数据管理</div>
    <button class="btn btn-light" onclick="backupData()">备份数据</button>
    <button class="btn btn-light" onclick="restoreData()">恢复数据</button>
    <div style="height:14px;"></div>
    <button class="btn btn-danger" onclick="clearAllData()">清空所有数据</button>
  </div>
</div>

<script>
// ===================== FIREBASE 配置 =====================
const firebaseConfig = {
  apiKey: "AIzaSyCzKWM0DMQIQqr7-dXWQ8lP_FJHlf_nRKg",
  authDomain: "lovetest-b5f35.firebaseapp.com",
  databaseURL: "https://lovetest-b5f35-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "lovetest-b5f35",
  storageBucket: "lovetest-b5f35.firebasestorage.app",
  messagingSenderId: "1093050000609",
  appId: "1:1093050000609:web:f6bd42d28fdcaecaf1c3a0",
  measurementId: "G-5518PCMM0D"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let user = null;

async function login() {
  const e = document.getElementById("email").value.trim();
  const p = document.getElementById("pwd").value.trim();
  if (!e || !p) return alert("请输入邮箱和密码");
  try {
    await auth.signInWithEmailAndPassword(e, p);
  } catch (err) {
    alert("登录失败：" + err.message);
  }
}

async function register() {
  const e = document.getElementById("email").value.trim();
  const p = document.getElementById("pwd").value.trim();
  if (!e || !p) return alert("请输入邮箱和密码");
  try {
    await auth.createUserWithEmailAndPassword(e, p);
  } catch (err) {
    alert("注册失败：" + err.message);
  }
}

async function logout() {
  if (!confirm("确定退出登录？")) return;
  await auth.signOut();
}

auth.onAuthStateChanged(async (u) => {
  user = u;
  if (u) {
    document.getElementById("authModal").style.display = "none";
    await loadCloudData();
    initAll();
  } else {
    document.getElementById("authModal").style.display = "flex";
  }
});

// ===================== 全局变量 =====================
let currentMood = "";
let currentTab = 0;
let currentFilter = "all";
let currentSort = "desc";
let editRecordId = null;
let currentPhotoBase64 = "";
let cloudRecords = [];
let cloudProfile = {};

// ===================== 云数据 =====================
async function loadCloudData() {
  if (!user) return;
  const snap = await db.collection("users").doc(user.uid).collection("records").orderBy("id", "desc").get();
  cloudRecords = snap.docs.map(d => d.data());
  const prof = await db.collection("users").doc(user.uid).get();
  cloudProfile = prof.exists ? prof.data() : {};
}

async function saveCloudRecord(rec) {
  if (!user) return;
  await db.collection("users").doc(user.uid).collection("records").doc(rec.id + "").set(rec);
}

async function deleteCloudRecord(id) {
  if (!user) return;
  await db.collection("users").doc(user.uid).collection("records").doc(id + "").delete();
}

async function saveCloudProfile(p) {
  if (!user) return;
  await db.collection("users").doc(user.uid).set(p, { merge: true });
}

// ===================== 功能 =====================
function openImgPreview(src) {
  document.getElementById('previewImg').src = src;
  document.getElementById('imgPreviewModal').style.display = 'flex';
}
function closeImgPreview() {
  document.getElementById('imgPreviewModal').style.display = 'none';
}

window.onload = function () {
  initAll();
};

async function saveRecord() {
  const t = document.getElementById("recordType").value;
  const m = document.getElementById("moodText").value.trim() || currentMood || "未填写";
  const c = document.getElementById("recordContent").value.trim();
  const q = document.getElementById("recordQuote").value.trim() || "无";
  if (!c && !currentPhotoBase64) {
    alert("请写点内容或上传图片");
    return;
  }
  const rec = {
    id: editRecordId || Date.now(),
    time: getTime(),
    type: t,
    mood: m,
    content: c,
    quote: q,
    photo: currentPhotoBase64
  };
  if (editRecordId) {
    const i = cloudRecords.findIndex(x => x.id == editRecordId);
    if (i !== -1) cloudRecords[i] = rec;
  } else {
    cloudRecords.unshift(rec);
  }
  await saveCloudRecord(rec);
  document.querySelector(".main-title").classList.add("heart");
  setTimeout(() => document.querySelector(".main-title").classList.remove("heart"), 600);
  clearDraft();
  initAll();
}

async function deleteRecord(id) {
  if (!confirm("确定删除？")) return;
  cloudRecords = cloudRecords.filter(x => x.id != id);
  await deleteCloudRecord(id);
  initAll();
}

async function saveProfile() {
  const profile = {
    name: document.getElementById("nickname").value.trim(),
    birth: document.getElementById("birthday").value,
    first: document.getElementById("firstDay").value,
    like: document.getElementById("like").value.trim(),
    hate: document.getElementById("hate").value.trim(),
    habit: document.getElementById("habit").value.trim(),
    custom: []
  };
  document.querySelectorAll(".custom-item").forEach(item => {
    profile.custom.push({
      k: item.querySelector(".cKey").value,
      v: item.querySelector(".cVal").value
    });
  });
  cloudProfile = profile;
  await saveCloudProfile(profile);
  document.getElementById("girlName").innerText = profile.name || "我的女孩";
  initAll();
}

function getTime() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const h = String(now.getHours()).padStart(2, '0');
  const i = String(now.getMinutes()).padStart(2, '0');
  return `${y}-${m}-${d} ${h}:${i}`;
}

function updateWordCount() {
  const a = document.getElementById("recordContent").value.length;
  const b = document.getElementById("recordQuote").value.length;
  document.getElementById("wordCount1").innerText = a + " 字";
  document.getElementById("wordCount2").innerText = b + " 字";
}

function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 8 * 1024 * 1024) {
    alert("图片不能大于8MB");
    return;
  }
  const reader = new FileReader();
  reader.onload = (ev) => {
    currentPhotoBase64 = ev.target.result;
    document.getElementById("photoPreviewWrap").innerHTML = `
      <img src="${currentPhotoBase64}" class="photo-preview">
      <button class="photo-remove" onclick="removePhoto()">删除</button>
    `;
  };
  reader.readAsDataURL(file);
}

function removePhoto() {
  currentPhotoBase64 = "";
  document.getElementById("photoPreviewWrap").innerHTML = "";
}

function initAll() {
  loadProfile();
  showRecords();
  renderTimeline();
  renderCalendar();
  renderMoodChart();
  updateStats();
  loadDraft();
  updateWordCount();
}

function switchTab(i) {
  currentTab = i;
  document.querySelectorAll(".tab").forEach((t, j) => t.classList.toggle("active", j === i));
  document.querySelectorAll(".tab-content").forEach((c, j) => c.classList.toggle("active", j === i));
  window.scrollTo(0, 0);
}

function selectMood(el, t) {
  document.querySelectorAll(".mood-item").forEach(i => i.classList.remove("active"));
  el.classList.add("active");
  currentMood = t;
  document.getElementById("moodText").value = t;
  saveDraft();
}

function filterRecord(el, t) {
  currentFilter = t;
  document.querySelectorAll(".filter-item").forEach(i => i.classList.remove("active"));
  el.classList.add("active");
  showRecords();
}

function sortRecord(el, t) {
  currentSort = t;
  document.querySelectorAll(".sort-item").forEach(i => i.classList.remove("active"));
  el.classList.add("active");
  showRecords();
}

function searchRecord() {
  showRecords();
}

function saveDraft() {
  localStorage.setItem("DRAFT", JSON.stringify({
    type: document.getElementById("recordType").value,
    mood: document.getElementById("moodText").value,
    content: document.getElementById("recordContent").value,
    quote: document.getElementById("recordQuote").value,
    photo: currentPhotoBase64
  }));
}

function loadDraft() {
  const d = JSON.parse(localStorage.getItem("DRAFT") || "{}");
  if (d.type) document.getElementById("recordType").value = d.type;
  if (d.mood) document.getElementById("moodText").value = d.mood;
  if (d.content) document.getElementById("recordContent").value = d.content;
  if (d.quote) document.getElementById("recordQuote").value = d.quote;
  if (d.photo) {
    currentPhotoBase64 = d.photo;
    document.getElementById("photoPreviewWrap").innerHTML = `
      <img src="${currentPhotoBase64}" class="photo-preview">
      <button class="photo-remove" onclick="removePhoto()">删除</button>
    `;
  }
  updateWordCount();
}

function clearDraft() {
  localStorage.removeItem("DRAFT");
  document.getElementById("moodText").value = "";
  document.getElementById("recordContent").value = "";
  document.getElementById("recordQuote").value = "";
  document.querySelectorAll(".mood-item").forEach(i => i.classList.remove("active"));
  currentMood = "";
  editRecordId = null;
  currentPhotoBase64 = "";
  document.getElementById("photoPreviewWrap").innerHTML = "";
  document.getElementById("recordType").selectedIndex = 0;
  updateWordCount();
}

function addCustom() {
  const wrap = document.getElementById("customWrap");
  const div = document.createElement("div");
  div.className = "custom-item";
  div.innerHTML = `
    <input placeholder="名称" class="cKey">
    <input placeholder="内容" class="cVal">
    <button class="del-custom-btn" onclick="this.parentElement.remove()">×</button>
  `;
  wrap.appendChild(div);
}

function loadProfile() {
  const p = cloudProfile;
  document.getElementById("nickname").value = p.name || "";
  document.getElementById("birthday").value = p.birth || "";
  document.getElementById("firstDay").value = p.first || "";
  document.getElementById("like").value = p.like || "";
  document.getElementById("hate").value = p.hate || "";
  document.getElementById("habit").value = p.habit || "";
  document.getElementById("girlName").innerText = p.name || "我的女孩";
  const wrap = document.getElementById("customWrap");
  wrap.innerHTML = "";
  (p.custom || []).forEach(i => {
    const div = document.createElement("div");
    div.className = "custom-item";
    div.innerHTML = `
      <input value="${i.k}" class="cKey">
      <input value="${i.v}" class="cVal">
      <button class="del-custom-btn" onclick="this.parentElement.remove()">×</button>
    `;
    wrap.appendChild(div);
  });
}

function editRecord(id) {
  const r = cloudRecords.find(x => x.id == id);
  if (!r) return;
  document.getElementById("recordType").value = r.type;
  document.getElementById("moodText").value = r.mood;
  document.getElementById("recordContent").value = r.content;
  document.getElementById("recordQuote").value = r.quote;
  currentPhotoBase64 = r.photo || "";
  if (r.photo) {
    document.getElementById("photoPreviewWrap").innerHTML = `
      <img src="${currentPhotoBase64}" class="photo-preview">
      <button class="photo-remove" onclick="removePhoto()">删除</button>
    `;
  } else {
    document.getElementById("photoPreviewWrap").innerHTML = "";
  }
  editRecordId = id;
  switchTab(0);
}

function copyRecord(c, q) {
  const txt = `💌 故事：${c}\n💬 语录：${q}`;
  navigator.clipboard.writeText(txt).then(() => alert("复制成功"));
}

function showRecords() {
  const rs = cloudRecords;
  const box = document.getElementById("recordBox");
  const key = (document.getElementById("searchInput")?.value.trim().toLowerCase() || "");
  if (rs.length === 0) {
    box.innerHTML = '<div class="empty">还没有记录哦💕</div>';
    return;
  }
  let f = currentFilter === "all" ? rs : rs.filter(x => x.type === currentFilter);
  if (key) {
    f = f.filter(x =>
      (x.content || "").toLowerCase().includes(key) ||
      (x.quote || "").toLowerCase().includes(key) ||
      (x.mood || "").toLowerCase().includes(key)
    );
  }
  if (currentSort === "asc") f = [...f].reverse();
  if (f.length === 0) {
    box.innerHTML = '<div class="empty">没有找到匹配的回忆</div>';
    return;
  }
  let h = "";
  f.forEach(x => {
    h += `
      <div class="record-item">
        <div class="record-time">📅 ${x.time}</div>
        <div class="record-type">${x.type}</div>
        <div class="record-text">😊 ${x.mood}</div>
        <div class="record-text">💌 ${x.content || "无"}</div>
        <div class="record-text">💬 ${x.quote || "无"}</div>
        ${x.photo ? `<img src="${x.photo}" class="record-photo" onclick="openImgPreview('${x.photo}')">` : ""}
        <div class="record-op">
          <button class="op-btn edit" onclick="editRecord(${x.id})">编辑</button>
          <button class="op-btn" onclick="copyRecord('${(x.content||'').replace(/'/g, "\\'")}', '${(x.quote||'').replace(/'/g, "\\'")}')">复制</button>
          <button class="op-btn danger" onclick="deleteRecord(${x.id})">删除</button>
        </div>
      </div>
    `;
  });
  box.innerHTML = h;
}

function updateStats() {
  const rs = cloudRecords;
  document.getElementById("totalNum").innerText = rs.length;
  const p = cloudProfile;
  if (p.first) {
    const fd = new Date(p.first);
    const td = new Date();
    const d1 = new Date(fd.getFullYear(), fd.getMonth(), fd.getDate());
    const d2 = new Date(td.getFullYear(), td.getMonth(), td.getDate());
    const days = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));
    document.getElementById("loveDay").innerText = days >= 0 ? days : 0;
  } else {
    document.getElementById("loveDay").innerText = 0;
  }
  if (p.birth) {
    const bd = new Date(p.birth);
    const now = new Date();
    bd.setFullYear(now.getFullYear());
    if (bd < now) bd.setFullYear(now.getFullYear() + 1);
    const days = Math.ceil((bd - now) / (1000 * 60 * 60 * 24));
    document.getElementById("nextDay").innerText = days;
  } else {
    document.getElementById("nextDay").innerText = 0;
  }
}

function renderTimeline() {
  const rs = cloudRecords;
  const box = document.getElementById("timelineBox");
  if (rs.length === 0) {
    box.innerHTML = '<div class="empty">暂无回忆</div>';
    return;
  }
  const sorted = [...rs].sort((a, b) => new Date(a.time) - new Date(b.time));
  const yearMap = {};
  sorted.forEach(r => {
    const year = r.time.split("-")[0];
    if (!yearMap[year]) yearMap[year] = [];
    yearMap[year].push(r);
  });
  let h = "";
  Object.keys(yearMap).sort().forEach(year => {
    h += `<div class="timeline-year">${year}年</div><div class="timeline-line">`;
    yearMap[year].forEach(r => {
      h += `
        <div class="timeline-item">
          <div class="timeline-date">${r.time}</div>
          <div class="timeline-content">
            <div style="color:var(--primary-deep);font-weight:500;">${r.type}</div>
            <div style="margin:4px 0;">${r.content || "无"}</div>
            ${r.photo ? `<img src="${r.photo}" style="max-width:100%;border-radius:8px;margin-top:6px;">` : ""}
          </div>
        </div>
      `;
    });
    h += "</div>";
  });
  box.innerHTML = h;
}

function renderCalendar() {
  const box = document.getElementById("calendarBox");
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  let h = "";
  for (let i = 0; i < firstDay; i++) h += `<div class="calendar-day"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    h += `<div class="calendar-day">${d}</div>`;
  }
  box.innerHTML = h;
}

function renderMoodChart() {
  const rs = cloudRecords;
  const moodCount = {};
  rs.forEach(r => {
    const m = r.mood || "未填写";
    moodCount[m] = (moodCount[m] || 0) + 1;
  });
  const ctx = document.getElementById("moodChart").getContext("2d");
  if (window.moodChartInstance) window.moodChartInstance.destroy();
  window.moodChartInstance = new Chart(ctx, {
    type: "pie",
    data: {
      labels: Object.keys(moodCount),
      datasets: [{
        data: Object.values(moodCount),
        backgroundColor: ["#d65a8f","#e279a9","#f09fc1","#f5b8d2","#f9d2e3","#fce6ee","#fff"]
      }]
    },
    options: { responsive: true, maintainAspectRatio: false }
  });
}

function exportPdf() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const content = document.getElementById("recordBox");
  html2canvas(content).then(canvas => {
    const img = canvas.toDataURL("image/png");
    const imgWidth = 210;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    doc.addImage(img, "PNG", 0, 0, imgWidth, imgHeight);
    doc.save("时光情书.pdf");
  });
}

function exportImage() {
  const content = document.getElementById("recordBox");
  html2canvas(content, { useCORS: true }).then(canvas => {
    const a = document.createElement("a");
    a.href = canvas.toDataURL("image/png");
    a.download = "时光情书.png";
    a.click();
  });
}

function backupData() {
  const data = { records: cloudRecords, profile: cloudProfile };
  navigator.clipboard.writeText(JSON.stringify(data)).then(() => alert("备份已复制"));
}

function restoreData() {
  const data = prompt("粘贴备份");
  if (!data) return;
  try {
    const d = JSON.parse(data);
    alert("恢复成功，请重新登录生效");
  } catch (e) {
    alert("格式错误");
  }
}

async function clearAllData() {
  if (!confirm("确定清空云端所有数据？不可恢复！")) return;
  if (!user) return;
  const snap = await db.collection("users").doc(user.uid).collection("records").get();
  const batch = db.batch();
  snap.docs.forEach(doc => batch.delete(doc.ref));
  await batch.commit();
  await db.collection("users").doc(user.uid).set({});
  cloudRecords = [];
  cloudProfile = {};
  alert("已清空");
  initAll();
}

function setLockPwd() {
  const p = prompt("设置锁屏密码（4位以上）：");
  if (p && p.length >= 4) {
    localStorage.setItem("LOCK_PWD", p);
    alert("已设置");
  }
}

function setFakePwd() {
  const p = prompt("设置伪装密码：");
  if (p && p.length >= 4) {
    localStorage.setItem("FAKE_PWD", p);
    alert("已设置");
  }
}
</script>
</body>
</html>
